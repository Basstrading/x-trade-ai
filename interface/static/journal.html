<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>x-trade.ai — Journal & Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --bg: #0a0e14;
    --bg2: #0f1319;
    --bg3: #161b24;
    --border: rgba(255,255,255,0.06);
    --accent: #3b82f6;
    --accent2: #6366f1;
    --green: #22c55e;
    --red: #ef4444;
    --gold: #eab308;
    --text1: #f1f5f9;
    --text2: #64748b;
    --text3: #94a3b8;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text1); font-family:var(--font); font-size:14px; line-height:1.5; min-height:100vh; }

/* Header */
.header {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 32px; border-bottom:1px solid var(--border);
    background:var(--bg2);
}
.header-brand { font-size:16px; font-weight:700; color:var(--text1); letter-spacing:-0.3px; }
.header-brand span { color:var(--accent); }
.header-sub { font-size:11px; color:var(--text2); font-weight:400; }
.header-nav { display:flex; gap:8px; align-items:center; }
.header-nav a {
    padding:6px 14px; border-radius:6px; font-size:12px; font-weight:500;
    color:var(--text2); text-decoration:none; transition:all 0.15s;
}
.header-nav a:hover { color:var(--text1); background:var(--bg3); }
.header-nav a.active { color:var(--accent); background:rgba(59,130,246,0.1); }
.header-nav .user-email { color:var(--text2); font-size:11px; padding:6px 8px; }
.header-nav .logout { color:var(--text2); font-size:11px; }
.header-nav .logout:hover { color:var(--red); }

/* Container */
.container { max-width:1200px; margin:0 auto; padding:24px 32px; }

/* Stats */
.stats-row { display:grid; grid-template-columns:repeat(5, 1fr); gap:12px; margin-bottom:20px; }
@media(max-width:800px) { .stats-row { grid-template-columns:repeat(2, 1fr); } }
.stat {
    background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:16px 18px;
}
.stat-label { font-size:11px; font-weight:500; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
.stat-value { font-size:26px; font-weight:700; letter-spacing:-0.5px; }
.stat-sub { font-size:11px; color:var(--text2); margin-top:2px; }
.positive { color:var(--green); }
.negative { color:var(--red); }
.neutral { color:var(--accent); }

/* Cards */
.card {
    background:var(--bg2); border:1px solid var(--border); border-radius:10px;
    padding:20px; margin-bottom:16px;
}
.card-title { font-size:12px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:16px; }

/* Two column row */
.row-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
@media(max-width:800px) { .row-2 { grid-template-columns:1fr; } }

/* Payout bar */
.payout-bar {
    background:var(--bg2); border:1px solid rgba(34,197,94,0.15); border-radius:10px;
    padding:16px 20px; margin-bottom:20px;
}
.payout-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.payout-bg { height:10px; background:var(--bg3); border-radius:5px; overflow:hidden; }
.payout-fill {
    height:100%; border-radius:5px; transition:width 1s ease;
    background:linear-gradient(90deg, var(--accent), var(--green));
}
.payout-text { font-size:12px; color:var(--text2); margin-top:6px; text-align:center; }

/* Calendar */
.calendar { display:grid; grid-template-columns:repeat(7, 1fr); gap:4px; }
.cal-header { font-size:10px; font-weight:600; color:var(--text2); text-align:center; padding:6px; text-transform:uppercase; }
.cal-day {
    aspect-ratio:1.2; border-radius:8px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; font-size:11px; gap:2px;
    border:1px solid transparent; transition:all 0.15s; cursor:default;
}
.cal-day.empty { opacity:0; }
.cal-day.win { background:rgba(34,197,94,0.12); border-color:rgba(34,197,94,0.2); }
.cal-day.loss { background:rgba(239,68,68,0.12); border-color:rgba(239,68,68,0.2); }
.cal-day.flat { background:var(--bg3); }
.cal-day .day-num { font-weight:600; color:var(--text3); font-size:10px; }
.cal-day .day-pnl { font-weight:700; font-size:11px; }
.cal-day .day-trades { font-size:9px; color:var(--text2); }
.cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.cal-nav-month { font-size:14px; font-weight:600; }

/* Hour heatmap */
.hour-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(72px, 1fr)); gap:6px; }
.hour-cell {
    border-radius:8px; padding:12px 8px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:4px; transition:transform 0.15s;
}
.hour-cell:hover { transform:scale(1.05); }
.hour-label { font-size:12px; font-weight:600; color:var(--text3); }
.hour-value { font-weight:700; font-size:13px; }

/* Table */
.data-table { width:100%; border-collapse:collapse; font-size:13px; }
.data-table th {
    text-align:left; padding:10px 12px; font-size:11px; font-weight:600;
    color:var(--text2); text-transform:uppercase; letter-spacing:0.3px;
    border-bottom:1px solid var(--border);
}
.data-table td { padding:10px 12px; border-bottom:1px solid var(--border); }
.data-table tr:hover { background:rgba(59,130,246,0.03); }

/* Coach section */
.coach-section { margin-top:24px; }
.coach-header-bar {
    display:flex; align-items:center; gap:12px; margin-bottom:20px;
    padding:16px 20px; background:var(--bg2); border:1px solid rgba(59,130,246,0.15);
    border-radius:10px;
}
.coach-avatar {
    width:44px; height:44px; border-radius:50%;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    display:flex; align-items:center; justify-content:center;
    font-size:18px; font-weight:700; color:white;
}
.coach-name { font-size:15px; font-weight:600; }
.coach-role { font-size:12px; color:var(--text2); }

/* Pattern badges */
.badges { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:20px; }
.badge {
    padding:5px 12px; border-radius:20px; font-size:11px; font-weight:500;
}
.badge-critical { background:rgba(239,68,68,0.1); color:var(--red); border:1px solid rgba(239,68,68,0.2); }
.badge-serious { background:rgba(245,158,11,0.1); color:#f59e0b; border:1px solid rgba(245,158,11,0.2); }
.badge-moderate { background:rgba(234,179,8,0.1); color:var(--gold); border:1px solid rgba(234,179,8,0.2); }

/* Coach report content */
.report {
    background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:28px 32px;
    font-size:14px; line-height:1.8; color:var(--text3);
}
.report h2 { font-size:16px; font-weight:700; color:var(--text1); margin:28px 0 12px; letter-spacing:-0.3px; }
.report h2:first-child { margin-top:0; }
.report h3 { font-size:14px; font-weight:600; color:var(--accent); margin:20px 0 10px; }
.report strong { color:var(--text1); font-weight:600; }
.report em { color:var(--text2); font-style:italic; }
.report p { margin-bottom:12px; }
.report blockquote {
    margin:16px 0; padding:14px 20px; border-left:3px solid var(--accent);
    background:rgba(59,130,246,0.05); border-radius:0 8px 8px 0;
    font-size:14px; font-weight:500; color:var(--accent); line-height:1.6;
}
.report table { width:100%; border-collapse:collapse; margin:12px 0; font-size:12px; }
.report th { text-align:left; padding:8px 10px; color:var(--text2); font-weight:600; border-bottom:1px solid var(--border); }
.report td { padding:8px 10px; border-bottom:1px solid var(--border); }
.report li { margin:4px 0; }
.report .action-item {
    display:flex; gap:12px; padding:12px 16px; margin:8px 0;
    background:rgba(34,197,94,0.04); border:1px solid rgba(34,197,94,0.1);
    border-radius:8px; font-size:13px;
}
.report .action-num {
    width:24px; height:24px; border-radius:50%; flex-shrink:0;
    background:var(--green); color:var(--bg); font-weight:700;
    display:flex; align-items:center; justify-content:center; font-size:11px;
}

/* Chart */
.chart-box { position:relative; height:220px; }

/* Loading */
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px; color:var(--text2); }
.spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin-bottom:16px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Scrollbar */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(100,116,139,0.2); border-radius:3px; }
</style>
</head>
<body>

<div class="header">
    <div>
        <div class="header-brand"><span>x-trade</span>.ai</div>
        <div class="header-sub">Performance & Coaching</div>
    </div>
    <div class="header-nav">
        <a href="/journal" class="active">Journal</a>
        <a href="/risk-desk">Risk Desk</a>
        <span class="user-email" id="user-email"></span>
        <a href="#" class="logout" onclick="logout();return false">Logout</a>
    </div>
</div>

<div class="container" id="app">
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div style="font-size:13px;font-weight:500">Analyse en cours...</div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://yqmjootmvonhqzzmtwij.supabase.co';
const SUPABASE_KEY = 'sb_publishable_p84R-Eu5vTObiFC42DHNxA_AysCkQdn';
const API_BASE = window.location.origin;

const sbToken = localStorage.getItem('sb_token');
const sbUserId = localStorage.getItem('sb_user_id');
if (!sbToken || !sbUserId) window.location.href = '/journal/login';

function logout() {
    localStorage.clear();
    window.location.href = '/journal/login';
}

const emailEl = document.getElementById('user-email');
if (emailEl) emailEl.textContent = localStorage.getItem('sb_email') || '';

async function loadJournal() {
    try {
        const r = await fetch(`${API_BASE}/api/journal?user_id=${sbUserId}`);
        const data = await r.json();
        if (data.error) {
            document.getElementById('app').innerHTML = `<div style="text-align:center;padding:80px;color:var(--text2)">${data.error}</div>`;
            return;
        }
        renderJournal(data);
    } catch(e) {
        document.getElementById('app').innerHTML = `<div style="text-align:center;padding:80px;color:var(--red)">${e.message}</div>`;
    }
}

function renderJournal(data) {
    const m = data.metrics;
    const dm = data.daily_metrics || {};
    const patterns = data.patterns_detected || [];
    const days = Object.keys(dm).sort();
    const app = document.getElementById('app');

    const netPnl = m.net_pnl || 0;
    const numAccounts = 5; // TODO: from API
    const totalPnl = netPnl; // Already aggregated from API
    const payoutTarget = 3000;
    const payoutPct = Math.min(100, Math.max(0, (totalPnl / payoutTarget) * 100));

    let html = '';

    // ═══ PAYOUT BAR ═══
    html += `
    <div class="payout-bar">
        <div class="payout-header">
            <div class="card-title" style="margin:0">Progression Payout</div>
            <div style="font-size:12px;color:var(--text2)">Objectif: $${payoutTarget.toLocaleString()}</div>
        </div>
        <div class="payout-bg"><div class="payout-fill" style="width:${Math.max(1,payoutPct)}%"></div></div>
        <div class="payout-text">$${totalPnl.toFixed(0)} / $${payoutTarget.toLocaleString()} (${payoutPct.toFixed(0)}%)</div>
    </div>`;

    // ═══ KEY STATS ═══
    const wr = m.win_rate||0, pf = m.profit_factor||0, rr = m.rr_ratio||0, exp = m.expectancy||0;
    html += `
    <div class="stats-row">
        <div class="stat">
            <div class="stat-label">Net P&L</div>
            <div class="stat-value ${netPnl>=0?'positive':'negative'}">$${netPnl.toFixed(0)}</div>
            <div class="stat-sub">${data.total_trades || m.total_trades} trades / ${days.length} jours (${data.accounts_count || 1} comptes)</div>
        </div>
        <div class="stat">
            <div class="stat-label">Win Rate</div>
            <div class="stat-value ${wr>=50?'positive':wr>=40?'neutral':'negative'}">${wr.toFixed(1)}%</div>
            <div class="stat-sub">${m.wins}W / ${m.losses}L</div>
        </div>
        <div class="stat">
            <div class="stat-label">Profit Factor</div>
            <div class="stat-value ${pf>=1.5?'positive':pf>=1?'neutral':'negative'}">${pf.toFixed(2)}</div>
            <div class="stat-sub">R:R ${rr.toFixed(2)}</div>
        </div>
        <div class="stat">
            <div class="stat-label">Esperance</div>
            <div class="stat-value ${exp>=0?'positive':'negative'}">$${exp.toFixed(2)}</div>
            <div class="stat-sub">par trade</div>
        </div>
        <div class="stat">
            <div class="stat-label">Max Drawdown</div>
            <div class="stat-value negative">$${(m.max_drawdown||0).toFixed(0)}</div>
            <div class="stat-sub">peak to valley</div>
        </div>
    </div>`;

    // ═══ CALENDAR + EQUITY ═══
    // Store calDays globally for month navigation
    window._calDays = {};
    for (const d of days) { window._calDays[d] = dm[d]; }

    // Current month to display (default: current month)
    const now = new Date();
    window._calCurrentMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');

    html += `<div class="row-2">`;

    html += `
    <div class="card">
        <div id="calendar-container"></div>
    </div>`;

    // Equity curve
    html += `
    <div class="card">
        <div class="card-title">Equity Curve</div>
        <div class="chart-box"><canvas id="equity-chart"></canvas></div>
    </div>`;

    html += `</div>`; // end row-2

    // ═══ HOURS + DAILY TABLE ═══
    html += `<div class="row-2">`;

    // Hour heatmap (already in Paris time from backend)
    const byHourParis = m.by_hour || {};
    const allHours = Object.keys(byHourParis).map(Number).sort((a,b)=>a-b);
    const hStart = Math.min(...allHours, 9);
    const hEnd = Math.max(...allHours, 22);
    const maxAbs = Math.max(...Object.values(byHourParis).map(Math.abs), 1);
    let hourCells = '';
    for (let h = hStart; h <= hEnd; h++) {
        const v = byHourParis[h] || 0;
        const int = Math.abs(v) / maxAbs;
        let bg;
        if (v > 0) bg = `rgba(34,197,94,${0.08 + int * 0.35})`;
        else if (v < 0) bg = `rgba(239,68,68,${0.08 + int * 0.35})`;
        else bg = 'var(--bg3)';
        hourCells += `<div class="hour-cell" style="background:${bg}"><span class="hour-label">${h}h</span><span class="hour-value ${v>=0?'positive':'negative'}">$${v.toFixed(0)}</span></div>`;
    }
    const bestP = m.best_hour_et != null ? m.best_hour_et : '-';
    const worstP = m.worst_hour_et != null ? m.worst_hour_et : '-';

    html += `
    <div class="card">
        <div class="card-title">Performance par heure (Paris)</div>
        <div class="hour-grid">${hourCells}</div>
        <div style="margin-top:10px;font-size:12px;color:var(--text2)">
            Meilleure : <strong class="positive">${bestP}h</strong> &nbsp; Pire : <strong class="negative">${worstP}h</strong>
        </div>
    </div>`;

    // Daily table
    let rows = '';
    for (const d of days) {
        const day = dm[d];
        const net = day.net_pnl||0;
        const dayName = new Date(d+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
        rows += `<tr>
            <td style="color:var(--text2)">${dayName}</td>
            <td class="${net>=0?'positive':'negative'}" style="font-weight:600">$${net.toFixed(2)}</td>
            <td>${day.real_trade_count || day.total_trades}</td>
            <td>${(day.win_rate||0).toFixed(0)}%</td>
            <td style="font-size:12px;color:var(--text2)">${day.max_drawdown?'$'+day.max_drawdown.toFixed(0):'-'}</td>
        </tr>`;
    }
    html += `
    <div class="card">
        <div class="card-title">Historique par jour</div>
        <table class="data-table">
            <thead><tr><th>Jour</th><th>Net P&L</th><th>Trades</th><th>Win%</th><th>Max DD</th></tr></thead>
            <tbody>${rows}</tbody>
        </table>
    </div>`;

    html += `</div>`; // end row-2

    // ═══ SESSION PNL ═══
    html += `
    <div class="card">
        <div class="card-title">P&L par session</div>
        <div class="chart-box" style="height:160px"><canvas id="session-chart"></canvas></div>
    </div>`;

    // ═══ COACH SECTION (full width, below data) ═══
    let patternBadges = '';
    for (const p of patterns) {
        const cls = p.severity==='critical'?'badge-critical':p.severity==='serious'?'badge-serious':'badge-moderate';
        patternBadges += `<span class="badge ${cls}">${p.name}</span>`;
    }

    const reportHtml = markdownToHtml(data.full_report || '');

    html += `
    <div class="coach-section">
        <div class="coach-header-bar">
            <div class="coach-avatar">C</div>
            <div>
                <div class="coach-name">Coach x-trade</div>
                <div class="coach-role">Analyse comportementale — 40 ans de desk trading</div>
            </div>
        </div>
        <div class="badges">${patternBadges}</div>
        <div class="report">${reportHtml}</div>
    </div>`;

    app.innerHTML = html;

    // Charts
    renderCalendar(window._calCurrentMonth);
    renderEquityChart(data);
    renderSessionChart(m.session_pnl || {});
}

function renderEquityChart(data) {
    const dm = data.daily_metrics || {};
    const days = Object.keys(dm).sort();
    let cum = 0;
    const labels = [], values = [], colors = [];
    for (const d of days) {
        cum += (dm[d].net_pnl || 0);
        labels.push(new Date(d+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'}));
        values.push(cum);
        colors.push(cum >= 0 ? '#22c55e' : '#ef4444');
    }
    const ctx = document.getElementById('equity-chart');
    if (!ctx) return;
    new Chart(ctx, {
        type:'line',
        data:{ labels, datasets:[{
            data:values, borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,0.06)',
            fill:true, tension:0.3, pointRadius:5, pointBackgroundColor:colors,
            pointBorderColor:colors, borderWidth:2,
        }]},
        options:{
            responsive:true, maintainAspectRatio:false,
            plugins:{legend:{display:false}},
            scales:{
                x:{ticks:{color:'#64748b',font:{size:11,family:'Inter'}},grid:{color:'rgba(255,255,255,0.03)'}},
                y:{ticks:{color:'#64748b',font:{size:11,family:'Inter'},callback:v=>'$'+v},grid:{color:'rgba(255,255,255,0.03)'}},
            },
        },
    });
}

function renderSessionChart(sp) {
    const names = {asia:'Asia',london:'London',new_york:'New York',overnight:'Overnight'};
    const labels=[],values=[],colors=[];
    for (const [s,v] of Object.entries(sp)) {
        labels.push(names[s]||s); values.push(v);
        colors.push(v>=0?'rgba(34,197,94,0.7)':'rgba(239,68,68,0.7)');
    }
    const ctx = document.getElementById('session-chart');
    if (!ctx) return;
    new Chart(ctx, {
        type:'bar',
        data:{labels,datasets:[{data:values,backgroundColor:colors,borderRadius:6,barThickness:36}]},
        options:{
            responsive:true, maintainAspectRatio:false,
            plugins:{legend:{display:false}},
            scales:{
                x:{ticks:{color:'#64748b',font:{size:11,family:'Inter'}},grid:{display:false}},
                y:{ticks:{color:'#64748b',font:{size:11,family:'Inter'},callback:v=>'$'+v},grid:{color:'rgba(255,255,255,0.03)'}},
            },
        },
    });
}

// Calendar with month navigation
function renderCalendar(monthStr) {
    window._calCurrentMonth = monthStr;
    const container = document.getElementById('calendar-container');
    if (!container) return;

    const [y, mo] = monthStr.split('-').map(Number);
    const firstOfMonth = new Date(y, mo - 1, 1);
    const monthName = firstOfMonth.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
    const startDow = firstOfMonth.getDay() || 7;
    const daysInMonth = new Date(y, mo, 0).getDate();
    const calDays = window._calDays || {};

    // Month total
    let monthPnl = 0, monthTrades = 0;
    for (let d = 1; d <= daysInMonth; d++) {
        const ds = monthStr + '-' + String(d).padStart(2, '0');
        if (calDays[ds]) { monthPnl += calDays[ds].net_pnl || 0; monthTrades += calDays[ds].total_trades || 0; }
    }

    const dowNames = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'];
    let cells = dowNames.map(d => `<div class="cal-header">${d}</div>`).join('');
    for (let i = 1; i < startDow; i++) cells += `<div class="cal-day empty"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
        const ds = monthStr + '-' + String(d).padStart(2, '0');
        const dayData = calDays[ds];
        let cls = '', pnlStr = '', tradesStr = '';
        if (dayData) {
            const net = dayData.net_pnl || 0;
            cls = net > 0 ? 'win' : net < 0 ? 'loss' : 'flat';
            pnlStr = `<span class="day-pnl ${net >= 0 ? 'positive' : 'negative'}">$${net.toFixed(0)}</span>`;
            tradesStr = `<span class="day-trades">${dayData.real_trade_count || dayData.total_trades}t</span>`;
        }
        cells += `<div class="cal-day ${cls}"><span class="day-num">${d}</span>${pnlStr}${tradesStr}</div>`;
    }

    // Prev/next months
    const prev = new Date(y, mo - 2, 1);
    const next = new Date(y, mo, 1);
    const prevStr = prev.getFullYear() + '-' + String(prev.getMonth() + 1).padStart(2, '0');
    const nextStr = next.getFullYear() + '-' + String(next.getMonth() + 1).padStart(2, '0');

    container.innerHTML = `
        <div class="cal-nav">
            <button onclick="renderCalendar('${prevStr}')" style="background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;font-family:var(--font)">&larr;</button>
            <div>
                <div class="cal-nav-month">${monthName}</div>
                <div style="font-size:11px;color:var(--text2);text-align:center">
                    <span class="${monthPnl >= 0 ? 'positive' : 'negative'}" style="font-weight:600">$${monthPnl.toFixed(0)}</span>
                    <span style="margin-left:6px">${monthTrades} trades</span>
                </div>
            </div>
            <button onclick="renderCalendar('${nextStr}')" style="background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;font-family:var(--font)">&rarr;</button>
        </div>
        <div class="calendar">${cells}</div>
    `;
}

function markdownToHtml(md) {
    if (!md) return '';
    return md
        .replace(/\|(.+)\|\n\|[-| :]+\|\n([\s\S]*?)(?=\n\n|\n###|\n##|\n$)/g, (m, header, body) => {
            const ths = header.split('|').filter(Boolean).map(h=>`<th>${h.trim()}</th>`).join('');
            const rows = body.trim().split('\n').map(r=>{
                const tds = r.split('|').filter(Boolean).map(c=>`<td>${c.trim()}</td>`).join('');
                return `<tr>${tds}</tr>`;
            }).join('');
            return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
        })
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        .replace(/^(\d+)\.\s+(.+)$/gm, '<div class="action-item"><div class="action-num">$1</div><div>$2</div></div>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n(?!<)/g, '<br>');
}

loadJournal();
