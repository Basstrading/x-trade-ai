<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>x-trade.ai — Journal & Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --bg: #0a0e14;
    --bg2: #0f1319;
    --bg3: #161b24;
    --border: rgba(255,255,255,0.06);
    --accent: #3b82f6;
    --accent2: #6366f1;
    --green: #22c55e;
    --red: #ef4444;
    --gold: #eab308;
    --text1: #f1f5f9;
    --text2: #64748b;
    --text3: #94a3b8;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text1); font-family:var(--font); font-size:14px; line-height:1.5; min-height:100vh; }

/* Header */
.header {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 32px; border-bottom:1px solid var(--border);
    background:var(--bg2);
}
.header-brand { font-size:16px; font-weight:700; color:var(--text1); letter-spacing:-0.3px; }
.header-brand span { color:var(--accent); }
.header-sub { font-size:11px; color:var(--text2); font-weight:400; }
.header-nav { display:flex; gap:8px; align-items:center; }
.header-nav a {
    padding:6px 14px; border-radius:6px; font-size:12px; font-weight:500;
    color:var(--text2); text-decoration:none; transition:all 0.15s;
}
.header-nav a:hover { color:var(--text1); background:var(--bg3); }
.header-nav a.active { color:var(--accent); background:rgba(59,130,246,0.1); }
.header-nav .user-email { color:var(--text2); font-size:11px; padding:6px 8px; }
.header-nav .logout { color:var(--text2); font-size:11px; }
.header-nav .logout:hover { color:var(--red); }

/* Container */
.container { max-width:1200px; margin:0 auto; padding:24px 32px; }

/* Stats */
.stats-row { display:grid; grid-template-columns:repeat(5, 1fr); gap:12px; margin-bottom:20px; }
@media(max-width:800px) { .stats-row { grid-template-columns:repeat(2, 1fr); } }
.stat {
    background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:16px 18px;
}
.stat-label { font-size:11px; font-weight:500; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
.stat-value { font-size:26px; font-weight:700; letter-spacing:-0.5px; }
.stat-sub { font-size:11px; color:var(--text2); margin-top:2px; }
.positive { color:var(--green); }
.negative { color:var(--red); }
.neutral { color:var(--accent); }

/* Cards */
.card {
    background:var(--bg2); border:1px solid var(--border); border-radius:10px;
    padding:20px; margin-bottom:16px;
}
.card-title { font-size:12px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:16px; }

/* Two column row */
.row-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
@media(max-width:800px) { .row-2 { grid-template-columns:1fr; } }

/* Payout bar */
.payout-bar {
    background:var(--bg2); border:1px solid rgba(34,197,94,0.15); border-radius:10px;
    padding:16px 20px; margin-bottom:20px;
}
.payout-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.payout-bg { height:10px; background:var(--bg3); border-radius:5px; overflow:hidden; }
.payout-fill {
    height:100%; border-radius:5px; transition:width 1s ease;
    background:linear-gradient(90deg, var(--accent), var(--green));
}
.payout-text { font-size:12px; color:var(--text2); margin-top:6px; text-align:center; }

/* Calendar */
.calendar { display:grid; grid-template-columns:repeat(7, 1fr); gap:4px; }
.cal-header { font-size:10px; font-weight:600; color:var(--text2); text-align:center; padding:6px; text-transform:uppercase; }
.cal-day {
    aspect-ratio:1.2; border-radius:8px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; font-size:11px; gap:2px;
    border:1px solid transparent; transition:all 0.15s; cursor:default;
}
.cal-day.empty { opacity:0; }
.cal-day.win { background:rgba(34,197,94,0.12); border-color:rgba(34,197,94,0.2); }
.cal-day.loss { background:rgba(239,68,68,0.12); border-color:rgba(239,68,68,0.2); }
.cal-day.flat { background:var(--bg3); }
.cal-day .day-num { font-weight:600; color:var(--text3); font-size:10px; }
.cal-day .day-pnl { font-weight:700; font-size:11px; }
.cal-day .day-trades { font-size:9px; color:var(--text2); }
.cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.cal-nav-month { font-size:14px; font-weight:600; }

/* Hour heatmap */
.hour-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(72px, 1fr)); gap:6px; }
.hour-cell {
    border-radius:8px; padding:12px 8px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:4px; transition:transform 0.15s;
}
.hour-cell:hover { transform:scale(1.05); }
.hour-label { font-size:12px; font-weight:600; color:var(--text3); }
.hour-value { font-weight:700; font-size:13px; }

/* Table */
.data-table { width:100%; border-collapse:collapse; font-size:13px; }
.data-table th {
    text-align:left; padding:10px 12px; font-size:11px; font-weight:600;
    color:var(--text2); text-transform:uppercase; letter-spacing:0.3px;
    border-bottom:1px solid var(--border);
}
.data-table td { padding:10px 12px; border-bottom:1px solid var(--border); }
.data-table tr:hover { background:rgba(59,130,246,0.03); }

/* Coach section */
.coach-section { margin-top:32px; }
.coach-header-bar {
    display:flex; align-items:center; gap:16px; margin-bottom:24px;
    padding:20px 24px; background:linear-gradient(135deg, rgba(59,130,246,0.08), rgba(99,102,241,0.05));
    border:1px solid rgba(59,130,246,0.15); border-radius:12px;
}
.coach-avatar {
    width:52px; height:52px; border-radius:14px;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    display:flex; align-items:center; justify-content:center;
    font-size:22px; font-weight:700; color:white; flex-shrink:0;
}
.coach-info { flex:1; }
.coach-name { font-size:16px; font-weight:700; letter-spacing:-0.3px; }
.coach-role { font-size:12px; color:var(--text2); margin-top:2px; }
.coach-score {
    display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:8px 16px; border-radius:10px; background:var(--bg);
}
.coach-grade { font-size:28px; font-weight:800; letter-spacing:-1px; }
.coach-grade-label { font-size:10px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; }

/* Pattern cards */
.pattern-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:12px; margin-bottom:24px; }
.pattern-card {
    padding:16px 18px; border-radius:10px; background:var(--bg2);
    border:1px solid var(--border); transition:transform 0.15s;
}
.pattern-card:hover { transform:translateY(-2px); }
.pattern-card.critical { border-left:3px solid var(--red); }
.pattern-card.serious { border-left:3px solid #f59e0b; }
.pattern-card.moderate { border-left:3px solid var(--gold); }
.pattern-sev { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
.pattern-sev.critical { color:var(--red); }
.pattern-sev.serious { color:#f59e0b; }
.pattern-sev.moderate { color:var(--gold); }
.pattern-name { font-size:14px; font-weight:600; color:var(--text1); margin-bottom:8px; }
.pattern-evidence { font-size:12px; color:var(--text3); line-height:1.5; }
.pattern-solution { font-size:12px; color:var(--green); margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }

/* Coach report content */
.report {
    background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:32px 36px;
    font-size:14px; line-height:1.8; color:var(--text3);
}
.report h2 {
    font-size:17px; font-weight:700; color:var(--text1); margin:32px 0 14px;
    letter-spacing:-0.3px; padding-bottom:8px; border-bottom:1px solid var(--border);
}
.report h2:first-child { margin-top:0; }
.report h3 {
    font-size:14px; font-weight:600; color:var(--accent); margin:24px 0 12px;
    display:flex; align-items:center; gap:8px;
}
.report h3::before { content:''; width:3px; height:16px; background:var(--accent); border-radius:2px; }
.report strong { color:var(--text1); font-weight:600; }
.report em { color:var(--text2); font-style:italic; }
.report p { margin-bottom:14px; }
.report blockquote {
    margin:20px 0; padding:16px 24px; border-left:3px solid var(--accent);
    background:rgba(59,130,246,0.05); border-radius:0 10px 10px 0;
    font-size:15px; font-weight:600; color:var(--accent); line-height:1.6;
}
.report table { width:100%; border-collapse:collapse; margin:16px 0; font-size:12px; }
.report th {
    text-align:left; padding:10px 12px; color:var(--text2); font-weight:600;
    border-bottom:2px solid var(--border); font-size:11px; text-transform:uppercase; letter-spacing:0.3px;
}
.report td { padding:10px 12px; border-bottom:1px solid var(--border); }
.report tr:hover { background:rgba(59,130,246,0.03); }
.report td:first-child { color:var(--text1); font-weight:500; }
.report li { margin:6px 0; padding-left:4px; }
.report .action-item {
    display:flex; gap:14px; padding:14px 18px; margin:10px 0;
    background:rgba(34,197,94,0.04); border:1px solid rgba(34,197,94,0.1);
    border-radius:10px; font-size:13px; line-height:1.6; transition:background 0.15s;
}
.report .action-item:hover { background:rgba(34,197,94,0.08); }
.report .action-num {
    width:26px; height:26px; border-radius:50%; flex-shrink:0;
    background:var(--green); color:var(--bg); font-weight:700;
    display:flex; align-items:center; justify-content:center; font-size:12px;
}

/* Day analysis cards */
.report .day-vert { padding:8px 0 8px 12px; margin:6px 0; border-left:2px solid var(--green); }
.report .day-rouge { padding:8px 0 8px 12px; margin:6px 0; border-left:2px solid var(--red); }

/* Chart */
.chart-box { position:relative; height:220px; }

/* Loading */
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px; color:var(--text2); }
.spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin-bottom:16px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Scrollbar */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(100,116,139,0.2); border-radius:3px; }
</style>
</head>
<body>

<div class="header">
    <div>
        <div class="header-brand"><span>x-trade</span>.ai</div>
        <div class="header-sub">Performance & Coaching</div>
    </div>
    <div class="header-nav">
        <a href="/journal" class="active">Journal</a>
        <a href="/risk-desk">Risk Desk</a>
        <a href="#" id="sync-btn" onclick="syncTrades();return false" style="color:var(--accent)">Sync</a>
        <span class="user-email" id="user-email"></span>
        <a href="#" class="logout" onclick="logout();return false">Logout</a>
    </div>
</div>

<div class="container" id="app">
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div style="font-size:13px;font-weight:500">Analyse en cours...</div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://yqmjootmvonhqzzmtwij.supabase.co';
const SUPABASE_KEY = 'sb_publishable_p84R-Eu5vTObiFC42DHNxA_AysCkQdn';
const API_BASE = window.location.origin;

const sbToken = localStorage.getItem('sb_token');
const sbUserId = localStorage.getItem('sb_user_id');
if (!sbToken || !sbUserId) window.location.href = '/journal/login';

function logout() {
    localStorage.clear();
    window.location.href = '/journal/login';
}

const emailEl = document.getElementById('user-email');
if (emailEl) emailEl.textContent = localStorage.getItem('sb_email') || '';

async function syncTrades() {
    const btn = document.getElementById('sync-btn');
    btn.textContent = 'Syncing...';
    btn.style.pointerEvents = 'none';
    try {
        const r = await fetch(`${API_BASE}/api/sync-trades?user_id=${sbUserId}`, {method:'POST'});
        const data = await r.json();
        if (data.ok) {
            btn.textContent = `${data.total_trades || 0} synced`;
            setTimeout(() => { btn.textContent = 'Sync'; btn.style.pointerEvents = 'auto'; }, 2000);
            loadJournal(); // Refresh
        } else {
            btn.textContent = data.error || 'Error';
            setTimeout(() => { btn.textContent = 'Sync'; btn.style.pointerEvents = 'auto'; }, 3000);
        }
    } catch(e) {
        btn.textContent = 'Error';
        setTimeout(() => { btn.textContent = 'Sync'; btn.style.pointerEvents = 'auto'; }, 3000);
    }
}

async function loadJournal() {
    try {
        // Vérifier si l'user a des comptes configurés
        const accR = await fetch(`${API_BASE}/api/journal/accounts?user_id=${sbUserId}`);
        const accData = await accR.json();
        const hasAccounts = accData.accounts && accData.accounts.length > 0;

        if (!hasAccounts) {
            showSetup();
            return;
        }

        const r = await fetch(`${API_BASE}/api/journal?user_id=${sbUserId}`);
        const data = await r.json();
        if (data.error && data.trades_analyzed === 0) {
            showSetup();
            return;
        }
        if (data.error) {
            document.getElementById('app').innerHTML = `<div style="text-align:center;padding:80px;color:var(--text2)">${data.error}</div>`;
            return;
        }
        renderJournal(data);
    } catch(e) {
        document.getElementById('app').innerHTML = `<div style="text-align:center;padding:80px;color:var(--red)">${e.message}</div>`;
    }
}

function showSetup() {
    const app = document.getElementById('app');
    app.innerHTML = `
    <div style="max-width:500px;margin:60px auto;text-align:center">
        <div style="font-size:48px;margin-bottom:20px">📊</div>
        <h2 style="font-size:22px;font-weight:700;margin-bottom:8px">Connectez votre compte Topstep</h2>
        <p style="color:var(--text2);font-size:14px;margin-bottom:32px">
            Entrez vos identifiants API pour synchroniser vos trades et activer le coaching.
        </p>
        <div style="text-align:left">
            <label style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px">Username</label>
            <input type="text" id="setup-username" placeholder="Ex: Bass123"
                style="width:100%;padding:14px 16px;margin:6px 0 16px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text1);font-size:14px;font-family:var(--font);outline:none">

            <label style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px">API Key</label>
            <input type="password" id="setup-apikey" placeholder="Votre clé API Topstep"
                style="width:100%;padding:14px 16px;margin:6px 0 24px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text1);font-size:14px;font-family:var(--font);outline:none">
        </div>

        <button onclick="connectTopstep()" id="setup-btn"
            style="width:100%;padding:16px;background:var(--accent);color:var(--bg);border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;transition:opacity 0.15s">
            Connecter et synchroniser
        </button>
        <div id="setup-msg" style="margin-top:16px;font-size:13px"></div>

        <div style="margin-top:32px;padding-top:20px;border-top:1px solid var(--border)">
            <p style="color:var(--text2);font-size:12px">
                Où trouver votre API Key ?<br>
                TopstepX → Settings → API Keys → Créer une clé
            </p>
        </div>
    </div>`;
}

async function connectTopstep() {
    const btn = document.getElementById('setup-btn');
    const msg = document.getElementById('setup-msg');
    const username = document.getElementById('setup-username').value.trim();
    const apikey = document.getElementById('setup-apikey').value.trim();

    if (!username || !apikey) {
        msg.innerHTML = '<span style="color:var(--red)">Remplissez les deux champs</span>';
        return;
    }

    btn.textContent = 'Connexion en cours...';
    btn.disabled = true;
    msg.innerHTML = '<span style="color:var(--text2)">Login Topstep...</span>';

    try {
        const r = await fetch(`${API_BASE}/api/journal/connect-topstep?user_id=${sbUserId}&username=${encodeURIComponent(username)}&api_key=${encodeURIComponent(apikey)}`, {method:'POST'});
        const data = await r.json();

        if (data.ok) {
            msg.innerHTML = `<span style="color:var(--green)">${data.accounts_count} compte(s) connecté(s) — ${data.sync?.total_trades || 0} trades synchronisés</span>`;
            setTimeout(() => {
                document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div><div style="font-size:13px;font-weight:500">Analyse en cours...</div></div>';
                loadJournal();
            }, 1500);
        } else {
            msg.innerHTML = `<span style="color:var(--red)">${data.error || 'Erreur de connexion'}</span>`;
            btn.textContent = 'Connecter et synchroniser';
            btn.disabled = false;
        }
    } catch(e) {
        msg.innerHTML = `<span style="color:var(--red)">${e.message}</span>`;
        btn.textContent = 'Connecter et synchroniser';
        btn.disabled = false;
    }
}

function renderJournal(data) {
    const m = data.metrics;
    const dm = data.daily_metrics || {};
    const patterns = data.patterns_detected || [];
    const days = Object.keys(dm).sort();
    const app = document.getElementById('app');

    const netPnl = m.net_pnl || 0;
    const numAccounts = 5; // TODO: from API
    const totalPnl = netPnl; // Already aggregated from API
    const payoutTarget = 3000;
    const payoutPct = Math.min(100, Math.max(0, (totalPnl / payoutTarget) * 100));

    let html = '';

    // ═══ PAYOUT BAR ═══
    html += `
    <div class="payout-bar">
        <div class="payout-header">
            <div class="card-title" style="margin:0">Progression Payout</div>
            <div style="font-size:12px;color:var(--text2)">Objectif: $${payoutTarget.toLocaleString()}</div>
        </div>
        <div class="payout-bg"><div class="payout-fill" style="width:${Math.max(1,payoutPct)}%"></div></div>
        <div class="payout-text">$${totalPnl.toFixed(0)} / $${payoutTarget.toLocaleString()} (${payoutPct.toFixed(0)}%)</div>
    </div>`;

    // ═══ KEY STATS ═══
    const wr = m.win_rate||0, pf = m.profit_factor||0, rr = m.rr_ratio||0, exp = m.expectancy||0;
    html += `
    <div class="stats-row">
        <div class="stat">
            <div class="stat-label">Net P&L</div>
            <div class="stat-value ${netPnl>=0?'positive':'negative'}">$${netPnl.toFixed(0)}</div>
            <div class="stat-sub">${data.total_trades || m.total_trades} trades / ${days.length} jours (${data.accounts_count || 1} comptes)</div>
        </div>
        <div class="stat">
            <div class="stat-label">Win Rate</div>
            <div class="stat-value ${wr>=50?'positive':wr>=40?'neutral':'negative'}">${wr.toFixed(1)}%</div>
            <div class="stat-sub">${m.wins}W / ${m.losses}L (1 compte)</div>
        </div>
        <div class="stat">
            <div class="stat-label">Profit Factor</div>
            <div class="stat-value ${pf>=1.5?'positive':pf>=1?'neutral':'negative'}">${pf.toFixed(2)}</div>
            <div class="stat-sub">R:R ${rr.toFixed(2)}</div>
        </div>
        <div class="stat">
            <div class="stat-label">Esperance</div>
            <div class="stat-value ${exp>=0?'positive':'negative'}">$${exp.toFixed(2)}</div>
            <div class="stat-sub">par trade</div>
        </div>
        <div class="stat">
            <div class="stat-label">Max Drawdown</div>
            <div class="stat-value negative">$${(m.max_drawdown||0).toFixed(0)}</div>
            <div class="stat-sub">peak to valley</div>
        </div>
    </div>`;

    // ═══ ADVANCED STATS ═══
    const sharpe = m.sharpe_ratio||0, sortino = m.sortino_ratio||0, calmar = m.calmar_ratio||0;
    const recov = m.recovery_factor||0, avgD = m.avg_daily_pnl||0, dvol = m.daily_volatility||0;
    html += `
    <div class="stats-row" style="grid-template-columns:repeat(6, 1fr);">
        <div class="stat">
            <div class="stat-label">Sharpe Ratio</div>
            <div class="stat-value ${sharpe>=1?'positive':sharpe>=0?'neutral':'negative'}">${sharpe.toFixed(2)}</div>
            <div class="stat-sub">annualisé (252j)</div>
        </div>
        <div class="stat">
            <div class="stat-label">Sortino Ratio</div>
            <div class="stat-value ${sortino>=1.5?'positive':sortino>=0?'neutral':'negative'}">${sortino.toFixed(2)}</div>
            <div class="stat-sub">downside risk</div>
        </div>
        <div class="stat">
            <div class="stat-label">Calmar Ratio</div>
            <div class="stat-value ${calmar>=1?'positive':calmar>=0?'neutral':'negative'}">${calmar.toFixed(2)}</div>
            <div class="stat-sub">rendement / DD</div>
        </div>
        <div class="stat">
            <div class="stat-label">Recovery Factor</div>
            <div class="stat-value ${recov>=1?'positive':recov>=0?'neutral':'negative'}">${recov.toFixed(2)}</div>
            <div class="stat-sub">PnL / |MaxDD|</div>
        </div>
        <div class="stat">
            <div class="stat-label">Avg Daily P&L</div>
            <div class="stat-value ${avgD>=0?'positive':'negative'}">$${avgD.toFixed(0)}</div>
            <div class="stat-sub">${m.num_trading_days||0} jours</div>
        </div>
        <div class="stat">
            <div class="stat-label">Volatilité</div>
            <div class="stat-value neutral">$${dvol.toFixed(0)}</div>
            <div class="stat-sub">écart-type journalier</div>
        </div>
    </div>`;

    // ═══ CALENDAR + EQUITY ═══
    // Store calDays globally for month navigation
    window._calDays = {};
    for (const d of days) { window._calDays[d] = dm[d]; }

    // Current month to display (default: current month)
    const now = new Date();
    window._calCurrentMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');

    html += `<div class="row-2">`;

    html += `
    <div class="card">
        <div id="calendar-container"></div>
    </div>`;

    // Equity curve
    html += `
    <div class="card">
        <div class="card-title">Equity Curve</div>
        <div class="chart-box"><canvas id="equity-chart"></canvas></div>
    </div>`;

    html += `</div>`; // end row-2

    // ═══ HOURS + DAILY TABLE ═══
    html += `<div class="row-2">`;

    // Hour heatmap (already in Paris time from backend)
    const byHourParis = m.by_hour || {};
    const allHours = Object.keys(byHourParis).map(Number).sort((a,b)=>a-b);
    const hStart = Math.min(...allHours, 9);
    const hEnd = Math.max(...allHours, 22);
    const maxAbs = Math.max(...Object.values(byHourParis).map(Math.abs), 1);
    let hourCells = '';
    for (let h = hStart; h <= hEnd; h++) {
        const v = byHourParis[h] || 0;
        const int = Math.abs(v) / maxAbs;
        let bg;
        if (v > 0) bg = `rgba(34,197,94,${0.08 + int * 0.35})`;
        else if (v < 0) bg = `rgba(239,68,68,${0.08 + int * 0.35})`;
        else bg = 'var(--bg3)';
        hourCells += `<div class="hour-cell" style="background:${bg}"><span class="hour-label">${h}h</span><span class="hour-value ${v>=0?'positive':'negative'}">$${v.toFixed(0)}</span></div>`;
    }
    const bestP = m.best_hour_et != null ? m.best_hour_et : '-';
    const worstP = m.worst_hour_et != null ? m.worst_hour_et : '-';

    html += `
    <div class="card">
        <div class="card-title">Performance par heure (Paris)</div>
        <div class="hour-grid">${hourCells}</div>
        <div style="margin-top:10px;font-size:12px;color:var(--text2)">
            Meilleure : <strong class="positive">${bestP}h</strong> &nbsp; Pire : <strong class="negative">${worstP}h</strong>
        </div>
    </div>`;

    // Daily table
    let rows = '';
    for (const d of days) {
        const day = dm[d];
        const net = day.net_pnl||0;
        const dayName = new Date(d+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
        rows += `<tr>
            <td style="color:var(--text2)">${dayName}</td>
            <td class="${net>=0?'positive':'negative'}" style="font-weight:600">$${net.toFixed(2)}</td>
            <td>${day.real_trade_count || day.total_trades}</td>
            <td>${(day.win_rate||0).toFixed(0)}%</td>
            <td style="font-size:12px;color:var(--text2)">${day.max_drawdown?'$'+day.max_drawdown.toFixed(0):'-'}</td>
        </tr>`;
    }
    html += `
    <div class="card">
        <div class="card-title">Historique par jour</div>
        <table class="data-table">
            <thead><tr><th>Jour</th><th>Net P&L</th><th>Trades</th><th>Win%</th><th>Max DD</th></tr></thead>
            <tbody>${rows}</tbody>
        </table>
    </div>`;

    html += `</div>`; // end row-2

    // ═══ SESSION PNL ═══
    html += `
    <div class="card">
        <div class="card-title">P&L par session</div>
        <div class="chart-box" style="height:160px"><canvas id="session-chart"></canvas></div>
    </div>`;

    // ═══ COACH SECTION (full width, below data) ═══

    // Score global (0-100) basé sur les métriques clés
    const scoreWr = Math.min(30, (wr / 60) * 30);
    const scorePf = Math.min(25, (pf / 2) * 25);
    const scorePatterns = Math.max(0, 25 - patterns.length * 8);
    const scoreConsist = Math.min(20, ((m.num_trading_days||1) / 10) * 20);
    const totalScore = Math.round(scoreWr + scorePf + scorePatterns + scoreConsist);
    const grade = totalScore >= 80 ? 'A' : totalScore >= 65 ? 'B' : totalScore >= 50 ? 'C' : totalScore >= 35 ? 'D' : 'F';
    const gradeColor = totalScore >= 65 ? 'positive' : totalScore >= 50 ? 'neutral' : 'negative';

    // Pattern cards
    let patternCards = '';
    if (patterns.length > 0) {
        patternCards = '<div class="pattern-grid">';
        for (const p of patterns) {
            const sev = p.severity || 'moderate';
            patternCards += `
            <div class="pattern-card ${sev}">
                <div class="pattern-sev ${sev}">${sev === 'critical' ? 'CRITIQUE' : sev === 'serious' ? 'SERIEUX' : 'MODERE'}</div>
                <div class="pattern-name">${p.name}</div>
                <div class="pattern-evidence">${p.evidence}</div>
                <div class="pattern-solution">${p.solution}</div>
            </div>`;
        }
        patternCards += '</div>';
    }

    const reportHtml = markdownToHtml(data.full_report || '');

    html += `
    <div class="coach-section">
        <div class="coach-header-bar">
            <div class="coach-avatar">C</div>
            <div class="coach-info">
                <div class="coach-name">Coach x-trade</div>
                <div class="coach-role">Analyse comportementale — ${data.trades_analyzed || m.total_trades} trades sur ${m.num_trading_days||days.length} jours</div>
            </div>
            <div class="coach-score">
                <div class="coach-grade ${gradeColor}">${grade}</div>
                <div class="coach-grade-label">Score ${totalScore}/100</div>
            </div>
        </div>
        ${patternCards}
        <div class="report">${reportHtml}</div>
    </div>`;

    app.innerHTML = html;

    // Charts
    renderCalendar(window._calCurrentMonth);
    renderEquityChart(data);
    renderSessionChart(m.session_pnl || {});
}

function renderEquityChart(data) {
    const dm = data.daily_metrics || {};
    const days = Object.keys(dm).sort();
    let cum = 0;
    const labels = [], values = [], colors = [];
    for (const d of days) {
        cum += (dm[d].net_pnl || 0);
        labels.push(new Date(d+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'}));
        values.push(cum);
        colors.push(cum >= 0 ? '#22c55e' : '#ef4444');
    }
    const ctx = document.getElementById('equity-chart');
    if (!ctx) return;
    new Chart(ctx, {
        type:'line',
        data:{ labels, datasets:[{
            data:values, borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,0.06)',
            fill:true, tension:0.3, pointRadius:5, pointBackgroundColor:colors,
            pointBorderColor:colors, borderWidth:2,
        }]},
        options:{
            responsive:true, maintainAspectRatio:false,
            plugins:{legend:{display:false}},
            scales:{
                x:{ticks:{color:'#64748b',font:{size:11,family:'Inter'}},grid:{color:'rgba(255,255,255,0.03)'}},
                y:{ticks:{color:'#64748b',font:{size:11,family:'Inter'},callback:v=>'$'+v},grid:{color:'rgba(255,255,255,0.03)'}},
            },
        },
    });
}

function renderSessionChart(sp) {
    const names = {asia:'Asia',london:'London',new_york:'New York',overnight:'Overnight'};
    const labels=[],values=[],colors=[];
    for (const [s,v] of Object.entries(sp)) {
        labels.push(names[s]||s); values.push(v);
        colors.push(v>=0?'rgba(34,197,94,0.7)':'rgba(239,68,68,0.7)');
    }
    const ctx = document.getElementById('session-chart');
    if (!ctx) return;
    new Chart(ctx, {
        type:'bar',
        data:{labels,datasets:[{data:values,backgroundColor:colors,borderRadius:6,barThickness:36}]},
        options:{
            responsive:true, maintainAspectRatio:false,
            plugins:{legend:{display:false}},
            scales:{
                x:{ticks:{color:'#64748b',font:{size:11,family:'Inter'}},grid:{display:false}},
                y:{ticks:{color:'#64748b',font:{size:11,family:'Inter'},callback:v=>'$'+v},grid:{color:'rgba(255,255,255,0.03)'}},
            },
        },
    });
}

// Calendar with month navigation
function renderCalendar(monthStr) {
    window._calCurrentMonth = monthStr;
    const container = document.getElementById('calendar-container');
    if (!container) return;

    const [y, mo] = monthStr.split('-').map(Number);
    const firstOfMonth = new Date(y, mo - 1, 1);
    const monthName = firstOfMonth.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
    const startDow = firstOfMonth.getDay() || 7;
    const daysInMonth = new Date(y, mo, 0).getDate();
    const calDays = window._calDays || {};

    // Month total
    let monthPnl = 0, monthTrades = 0;
    for (let d = 1; d <= daysInMonth; d++) {
        const ds = monthStr + '-' + String(d).padStart(2, '0');
        if (calDays[ds]) { monthPnl += calDays[ds].net_pnl || 0; monthTrades += calDays[ds].real_trade_count || calDays[ds].total_trades || 0; }
    }

    const dowNames = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'];
    let cells = dowNames.map(d => `<div class="cal-header">${d}</div>`).join('');
    for (let i = 1; i < startDow; i++) cells += `<div class="cal-day empty"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
        const ds = monthStr + '-' + String(d).padStart(2, '0');
        const dayData = calDays[ds];
        let cls = '', pnlStr = '', tradesStr = '';
        if (dayData) {
            const net = dayData.net_pnl || 0;
            cls = net > 0 ? 'win' : net < 0 ? 'loss' : 'flat';
            pnlStr = `<span class="day-pnl ${net >= 0 ? 'positive' : 'negative'}">$${net.toFixed(0)}</span>`;
            tradesStr = `<span class="day-trades">${dayData.real_trade_count || dayData.total_trades}t</span>`;
        }
        cells += `<div class="cal-day ${cls}"><span class="day-num">${d}</span>${pnlStr}${tradesStr}</div>`;
    }

    // Prev/next months
    const prev = new Date(y, mo - 2, 1);
    const next = new Date(y, mo, 1);
    const prevStr = prev.getFullYear() + '-' + String(prev.getMonth() + 1).padStart(2, '0');
    const nextStr = next.getFullYear() + '-' + String(next.getMonth() + 1).padStart(2, '0');

    container.innerHTML = `
        <div class="cal-nav">
            <button onclick="renderCalendar('${prevStr}')" style="background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;font-family:var(--font)">&larr;</button>
            <div>
                <div class="cal-nav-month">${monthName}</div>
                <div style="font-size:11px;color:var(--text2);text-align:center">
                    <span class="${monthPnl >= 0 ? 'positive' : 'negative'}" style="font-weight:600">$${monthPnl.toFixed(0)}</span>
                    <span style="margin-left:6px">${monthTrades} trades</span>
                </div>
            </div>
            <button onclick="renderCalendar('${nextStr}')" style="background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;font-family:var(--font)">&rarr;</button>
        </div>
        <div class="calendar">${cells}</div>
    `;
}

function markdownToHtml(md) {
    if (!md) return '';
    return md
        .replace(/\|(.+)\|\n\|[-| :]+\|\n([\s\S]*?)(?=\n\n|\n###|\n##|\n$)/g, (m, header, body) => {
            const ths = header.split('|').filter(Boolean).map(h=>`<th>${h.trim()}</th>`).join('');
            const rows = body.trim().split('\n').map(r=>{
                const tds = r.split('|').filter(Boolean).map((c,i)=>{
                    const v = c.trim();
                    return `<td>${v}</td>`;
                }).join('');
                return `<tr>${tds}</tr>`;
            }).join('');
            return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
        })
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/\*\*(\d{4}-\d{2}-\d{2})\*\* — VERT/gm, '<div class="day-vert"><strong>$1</strong> — <span class="positive">VERT</span>')
        .replace(/\*\*(\d{4}-\d{2}-\d{2})\*\* — ROUGE/gm, '<div class="day-rouge"><strong>$1</strong> — <span class="negative">ROUGE</span>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        .replace(/^(\d+)\.\s+(.+)$/gm, '<div class="action-item"><div class="action-num">$1</div><div>$2</div></div>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n(?!<)/g, '<br>');
}

loadJournal();
</script>
